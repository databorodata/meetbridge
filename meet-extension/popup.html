<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meet Assist</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <div class="title">Meet Assist</div>
      <div id="status" class="status status--idle">готово</div>
    </header>

    <!-- Настройки (свёрнуты) -->
    <details class="details" id="detailsSettings">
      <summary class="details__summary">Настройки</summary>
      <div class="details__body">
        <label class="field">
          <div class="field__label">Repo path (git-репозиторий для агента)</div>
          <input id="repoPath" class="field__input" type="text" placeholder="/path/to/git/repo" />
        </label>

        <label class="field">
          <div class="field__label">Модель агента</div>
          <select id="model" class="select">
            <option value="auto" selected>auto</option>
            <option value="claude-4-sonnet">claude-4-sonnet</option>
            <option value="claude-4.5-sonnet-thinking">claude-4.5-sonnet-thinking</option>
            <option value="claude-4.6-opus-high-thinking">claude-4.6-opus-high-thinking</option>
            <option value="gpt-5.3-codex">gpt-5.3-codex</option>
            <option value="composer-2-fast">composer-2-fast</option>
            <option value="composer-2.5-fast">composer-2.5-fast</option>
            <option value="custom">другая...</option>
          </select>
          <input id="modelCustom" class="field__input field__input--hidden" type="text" placeholder="slug модели" />
        </label>

        <label class="field">
          <div class="field__label">Контекст встречи: последние N минут</div>
          <input id="contextWindowMinutes" class="field__input" type="number" min="0.5" max="120" step="0.5" value="3" />
        </label>

        <label class="field">
          <div class="field__label">Whisper: модель</div>
          <select id="whisperModel" class="select">
            <option value="tiny">tiny</option>
            <option value="base">base</option>
            <option value="small" selected>small</option>
            <option value="medium">medium</option>
          </select>
        </label>

        <label class="field">
          <div class="field__label">Язык аудио</div>
          <select id="whisperLanguage" class="select">
            <option value="">авто (определяется автоматически)</option>
            <option value="ru">Русский</option>
            <option value="en" selected>English</option>
            <option value="uk">Українська</option>
            <option value="de">Deutsch</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
            <option value="it">Italiano</option>
            <option value="pt">Português</option>
            <option value="zh">中文</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="ar">العربية</option>
            <option value="pl">Polski</option>
            <option value="nl">Nederlands</option>
            <option value="tr">Türkçe</option>
          </select>
        </label>
      </div>
    </details>

    <!-- Напоминание (dismissable) -->
    <div id="reminder" class="reminder">
      <span>Перед тем как приступить к прослушиванию, убедись что в Настройках указан путь к репозиторию</span>
      <button id="dismissReminder" class="reminder__close" type="button">&times;</button>
    </div>

    <!-- Захват встречи -->
    <section class="card">
      <button id="btnCapture" class="btn btn--primary" type="button">Слушать встречу</button>
      <textarea
        id="meetingContext"
        class="field__textarea field__textarea--readonly"
        rows="4"
        readonly
        placeholder="транскрипт встречи появится здесь..."
      ></textarea>
    </section>

    <!-- Вопрос -->
    <section class="card">
      <button id="btnDictation" class="btn btn--primary" type="button">Спросить у агента</button>
      <div class="textarea-toolbar">
        <button class="icon-btn" id="copyQuestion" type="button" title="Копировать">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="5" width="9" height="9" rx="2"/><path d="M11 5V3a2 2 0 0 0-2-2H3a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/></svg>
        </button>
        <button class="icon-btn" id="clearQuestion" type="button" title="Очистить">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,4 13,4"/><path d="M6 4V2h4v2"/><rect x="4" y="4" width="8" height="10" rx="1.5"/><line x1="6" y1="7" x2="6" y2="12"/><line x1="10" y1="7" x2="10" y2="12"/></svg>
        </button>
      </div>
      <textarea id="question" class="field__textarea" rows="3" placeholder="надиктованный вопрос..."></textarea>
      <button id="btnSendToAgent" class="btn btn--accent" type="button" disabled>Отправить агенту</button>
    </section>

    <!-- Ответ -->
    <section class="card">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:4px;">
        <span class="card__title" style="margin-bottom:0;">Ответ</span>
        <div class="textarea-toolbar">
          <button class="icon-btn" id="copyAnswer" type="button" title="Копировать">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="5" width="9" height="9" rx="2"/><path d="M11 5V3a2 2 0 0 0-2-2H3a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/></svg>
          </button>
          <button class="icon-btn" id="clearAnswer" type="button" title="Очистить">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,4 13,4"/><path d="M6 4V2h4v2"/><rect x="4" y="4" width="8" height="10" rx="1.5"/><line x1="6" y1="7" x2="6" y2="12"/><line x1="10" y1="7" x2="10" y2="12"/></svg>
          </button>
        </div>
      </div>
      <div id="answer" class="answer">(пусто)</div>
    </section>

    <script src="popup.js"></script>
  </body>
</html>
