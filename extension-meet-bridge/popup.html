<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meet Bridge</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <div class="title">Meet Bridge</div>
      <div id="status" class="status status--idle">нет соединения</div>
    </header>

    <section class="card">
      <div class="card__title">Настройки</div>

      <label class="field">
        <div class="field__label">Bridge URL</div>
        <input id="bridgeUrl" class="field__input" type="text" placeholder="http://127.0.0.1:7337" />
      </label>

      <label class="field">
        <div class="field__label">X-Bridge-Token (опционально)</div>
        <input id="bridgeToken" class="field__input" type="password" placeholder="секрет" />
      </label>

      <label class="field">
        <div class="field__label">Repo path (для /session/start)</div>
        <input
          id="repoPath"
          class="field__input"
          type="text"
          placeholder="/Users/nikita/projects/trails/trails-server"
        />
      </label>

      <label class="field">
        <div class="field__label">WhisperLive WebSocket (позже — захват аудио)</div>
        <input
          id="whisperWsUrl"
          class="field__input"
          type="text"
          placeholder="ws://127.0.0.1:9090"
        />
      </label>

      <label class="field">
        <div class="field__label">Whisper model (пресет)</div>
        <select id="whisperModel" class="select">
          <option value="tiny">tiny</option>
          <option value="base">base</option>
          <option value="small" selected>small</option>
          <option value="medium">medium</option>
        </select>
      </label>

      <div class="row">
        <button id="saveSettings" class="btn btn--secondary" type="button">Сохранить</button>
        <button id="health" class="btn" type="button">Проверить</button>
      </div>
    </section>

    <section class="card">
      <div class="card__title">Сессия</div>
      <div class="row row--top">
        <button id="startSession" class="btn" type="button">Start session</button>
        <div class="mono">
          <div class="muted">session_id</div>
          <div id="sessionId" class="mono__value">—</div>
        </div>
      </div>
      <div id="sessionInfo" class="small muted"></div>
    </section>

    <section class="card">
      <div class="card__title">Запрос агенту</div>

      <label class="field">
        <div class="field__label">Meeting context (пока руками)</div>
        <textarea id="meetingContext" class="field__textarea" rows="4" placeholder="последние 3 минуты транскрипта..."></textarea>
      </label>

      <label class="field">
        <div class="field__label">Question</div>
        <textarea id="question" class="field__textarea" rows="3" placeholder="что спросить у агента?"></textarea>
      </label>

      <div class="row">
        <button id="ask" class="btn" type="button">Отправить</button>
        <select id="model" class="select">
          <option value="auto" selected>auto</option>
          <option value="composer-2-fast">composer-2-fast</option>
          <option value="composer-2">composer-2</option>
        </select>
      </div>

      <div class="card__title card__title--mt">Ответ</div>
      <pre id="answer" class="answer">(пусто)</pre>
    </section>

    <script src="popup.js"></script>
  </body>
</html>
